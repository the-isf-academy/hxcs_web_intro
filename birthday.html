<!doctype html>
<html>

  <head>
    <link type="text/css" rel="stylesheet" href="styles.css">
  </head>

  <body>
    <div class="postcard">

      <div class="stamp">
         <img src="cat.png" alt="Stamp Image">
      </div>


      <div class="message">
        <p>Dear <b>[Friend's Name]</b>,</p>

        <h1>Happy Birthday!</h1>

      <div class="footer">
        <p>From your friend,</p>
        <b>[Your Name]</b>
      </div>

    </div>
  </body>
</html>
